name: Build release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Build with Gradle
        run: ./gradlew build

      - name: Build release metadata
        id: meta
        run: |
          echo "tag=v${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "name=Release #${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.meta.outputs.name }}
          generate_release_notes: true
          prerelease: false
          make_latest: true
          files: |
            build/libs/*.jar


      - name: Discord notification
        uses: Ilshidur/action-discord@0.4.0
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          DISCORD_USERNAME: 2b2t.lol Releases
          DISCORD_EMBEDS: >-
            [
              {
                "title": "${{ steps.meta.outputs.name }}",
                "url": "https://github.com/${{ github.repository }}/releases/tag/${{ steps.meta.outputs.tag }}",
                "description": ${{ toJson(steps.release_notes.outputs.body) }},
                "color": CCCCFF,
                "footer": {
                  "text": "2b2t.lol Releases"
                }
              }
            ]
        with:
          args: "New release published: ${{ steps.meta.outputs.tag }}"
