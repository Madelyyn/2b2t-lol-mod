name: Build release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Build with Gradle
        run: ./gradlew build

      - name: Build release metadata
        id: meta
        run: |
          echo "tag=v${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "name=Release #${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.meta.outputs.name }}
          generate_release_notes: true
          prerelease: false
          make_latest: true
          files: |
            build/libs/*.jar

      - name: Discord notification
        if: steps.changelog.outputs.should_notify == 'true'
        uses: Ilshidur/action-discord@0.4.0
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          DISCORD_USERNAME: 2b2t.lol Releases
        with:
          args: |
            A new mod version has been released.
            Download: https://2b2t.lol/download
