name: Build release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Build all supported versions
        run: ./gradlew --no-daemon clean buildAll

      - name: Collect release artifacts
        id: artifacts
        run: |
          mapfile -t JARS < <(ls -1 build/libs/*-mc*.jar 2>/dev/null | sort -V)
          if [ "${#JARS[@]}" -eq 0 ]; then
            echo "No multi-version JAR artifacts found in build/libs"
            exit 1
          fi

          printf '%s\n' "${JARS[@]}" > release-jars.txt

          {
            echo "files<<EOF"
            printf '%s\n' "${JARS[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build release metadata
        id: meta
        run: |
          echo "tag=v${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "name=Release #${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: make changelog
        id: changelog
        run: |
          BEFORE_SHA="${{ github.event.before }}"

          if [ "${{ github.event_name }}" = "push" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ] && git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
            RANGE="${BEFORE_SHA}..${GITHUB_SHA}"
          elif git rev-parse "${GITHUB_SHA}~1" >/dev/null 2>&1; then
            RANGE="${GITHUB_SHA}~1..${GITHUB_SHA}"
          else
            RANGE="${GITHUB_SHA}"
          fi

          CHANGELOG="$(git log --pretty=format:"[%h] %s (https://github.com/${GITHUB_REPOSITORY}/commit/%H)" "${RANGE}")"
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="[${GITHUB_SHA::7}] ${GITHUB_EVENT_NAME} (https://github.com/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA})"
          fi

          {
            echo "changelog<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.meta.outputs.name }}
          body: |
            Download: https://2b2t.lol/download

            ## Changelog
            ${{ steps.changelog.outputs.changelog }}
          prerelease: false
          make_latest: true
          files: ${{ steps.artifacts.outputs.files }}

      - name: Discord notification (all jars)
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK is not set; skipping Discord notification."
            exit 0
          fi

          MESSAGE="$(printf 'A new mod version has been released.\nDownload: https://2b2t.lol/download\n\nChangelog:\n%s\n\n<@1479521239889477743>' "$CHANGELOG")"

          curl_args=(
            -fsSL
            -X POST
            "$DISCORD_WEBHOOK"
            -F "username=2b2t.lol Releases"
            -F "content=${MESSAGE}"
          )

          index=0
          while IFS= read -r jar; do
            [ -n "$jar" ] || continue
            curl_args+=( -F "files[${index}]=@${jar}" )
            index=$((index + 1))
          done < release-jars.txt

          curl "${curl_args[@]}"
